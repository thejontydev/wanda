<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF8F5" />
  <title>wanda — coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink:       #1A1814;
      --ink-soft:  #3D3A35;
      --ink-muted: #7A756C;
      --paper:     #FAF8F5;
      --paper-mid: #E8E1D8;
      --terra:     #C4603A;
      --cream:     #F5F0E8;
    }

    html {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      background: #FAF8F5;
      background: radial-gradient(ellipse 140% 110% at 30% 35%, #FAF8F5 0%, #F3EBE0 52%, #E8DDD0 100%);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 500;
    }

    .arcs {
      position: fixed;
      top: -60px;
      right: -60px;
      width: 55vw;
      max-width: 460px;
      height: 55vw;
      max-height: 460px;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      -webkit-transition: -webkit-transform 1.8s cubic-bezier(0.16,1,0.3,1), opacity 1.4s ease;
      transition: transform 1.8s cubic-bezier(0.16,1,0.3,1), opacity 1.4s ease;
    }
    .arcs.shifted {
      -webkit-transform: translate(60px, -60px) scale(1.15) rotate(10deg);
      transform: translate(60px, -60px) scale(1.15) rotate(10deg);
      opacity: 0.3;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding: 6vw 6vw 5vw;
      padding-top: max(6vw, env(safe-area-inset-top, 6vw));
      padding-bottom: max(5vw, env(safe-area-inset-bottom, 5vw));
    }

    .zone-top { -webkit-flex-shrink: 0; flex-shrink: 0; }

    .wordmark-wrap {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: flex-end;
      align-items: flex-end;
      gap: 0;
      line-height: 1;
      opacity: 0;
      -webkit-animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.15s;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.15s;
    }

    .wordmark {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(5rem, 22vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--ink);
      text-transform: lowercase;
      white-space: nowrap;
      text-shadow: 0 2px 0 rgba(255,255,255,0.5), 0 8px 28px rgba(26,24,20,0.08);
    }

    .terra-dot {
      width: 0.55em;
      height: 0.55em;
      font-size: clamp(0.7rem, 3vw, 2rem);
      background: var(--terra);
      border-radius: 50%;
      margin-left: 0.12em;
      margin-bottom: 0.18em;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(196,96,58,0.4);
    }

    .zone-mid {
      -webkit-flex: 1;
      flex: 1;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-justify-content: center;
      justify-content: center;
      gap: clamp(0.8rem, 2.5vw, 1.8rem);
    }

    .eyebrow {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 500;
      font-size: clamp(10px, 2.8vw, 13px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0;
      -webkit-animation: fadeUp 0.6s ease forwards 0.38s;
      animation: fadeUp 0.6s ease forwards 0.38s;
    }

    .headline {
      opacity: 0;
      -webkit-animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
    }

    .hl-bold {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(1.7rem, 6.5vw, 5rem);
      letter-spacing: -0.025em;
      line-height: 1.02;
      color: var(--ink);
    }

    .hl-italic {
      display: block;
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      font-weight: 500;
      font-style: italic;
      font-size: clamp(1.7rem, 6.5vw, 5rem);
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--terra);
    }

    .cta-wrap {
      opacity: 0;
      -webkit-animation: fadeUp 0.6s ease forwards 0.65s;
      animation: fadeUp 0.6s ease forwards 0.65s;
    }

    .flap-btn {
      display: -webkit-inline-flex;
      display: inline-flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: clamp(0.75rem, 2.5vw, 1.1rem) clamp(1.6rem, 5vw, 2.8rem);
      border-radius: 999px;
      background-color: #1A1814;
      border: none;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.05) inset,
        0 6px 24px rgba(26,24,20,0.22),
        0 2px 6px rgba(26,24,20,0.16);
      -webkit-transition: -webkit-transform 0.18s ease, box-shadow 0.22s ease;
      transition: transform 0.18s ease, box-shadow 0.22s ease;
    }

    .flap-btn:hover {
      -webkit-transform: translateY(-2px);
      transform: translateY(-2px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.07) inset,
        0 10px 32px rgba(26,24,20,0.26),
        0 4px 10px rgba(26,24,20,0.18);
    }

    .flap-btn:active {
      -webkit-transform: scale(0.97);
      transform: scale(0.97);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.05) inset,
        0 3px 12px rgba(26,24,20,0.2);
    }

    .flap-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(
        105deg,
        transparent 20%,
        rgba(255,255,255,0.055) 50%,
        transparent 80%
      );
      background-size: 250% 100%;
      background-position: 200% 0;
      -webkit-animation: sheen 5s ease-in-out infinite;
      animation: sheen 5s ease-in-out infinite;
      pointer-events: none;
    }

    @-webkit-keyframes sheen {
      0%, 30% { background-position: 200% 0; }
      60%      { background-position: -100% 0; }
      100%     { background-position: 200% 0; }
    }
    @keyframes sheen {
      0%, 30% { background-position: 200% 0; }
      60%      { background-position: -100% 0; }
      100%     { background-position: 200% 0; }
    }

    .flap-display {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      gap: clamp(1px, 0.5vw, 4px);
      position: relative;
      z-index: 2;
    }

    .flap-char {
      position: relative;
      overflow: hidden;
      display: -webkit-inline-flex;
      display: inline-flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      width: clamp(10px, 3vw, 20px);
      height: clamp(20px, 6vw, 40px);
      -webkit-perspective: 200px;
      perspective: 200px;
    }

    .flap-char.is-space {
      width: clamp(4px, 1.2vw, 9px);
    }

    .flap-face {
      position: absolute;
      inset: 0;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: clamp(0.75rem, 2.8vw, 1.4rem);
      letter-spacing: 0.05em;
      color: #F5F0E8;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      will-change: transform;
      -webkit-transform-origin: center;
      transform-origin: center;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      white-space: nowrap;
    }

    .flap-char:not(.is-space)::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: rgba(0,0,0,0.3);
      z-index: 5;
      pointer-events: none;
    }

    .zone-bot { -webkit-flex-shrink: 0; flex-shrink: 0; }

    .footer-line {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: flex-start;
      align-items: flex-start;
      gap: 7px;
      opacity: 0;
      -webkit-animation: fadeUp 0.6s ease forwards 0.85s;
      animation: fadeUp 0.6s ease forwards 0.85s;
    }

    .footer-rule {
      width: 22px;
      height: 1px;
      background: var(--terra);
      opacity: 0.55;
    }

    .footer-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(16px, 4.5vw, 20px);
      letter-spacing: 0.01em;
      color: var(--ink-soft);
      text-transform: lowercase;
    }

    .ink-wash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #1A1814;
      -webkit-clip-path: circle(0% at 50% 70%);
      clip-path: circle(0% at 50% 70%);
      -webkit-transition: -webkit-clip-path 0.8s cubic-bezier(0.7,0,0.3,1);
      transition: clip-path 0.8s cubic-bezier(0.7,0,0.3,1);
      pointer-events: none;
    }
    .ink-wash.expand {
      -webkit-clip-path: circle(160% at 50% 70%);
      clip-path: circle(160% at 50% 70%);
      pointer-events: auto;
    }

    .conf-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding: 6vw 6vw 5vw;
      padding-top: max(6vw, env(safe-area-inset-top, 6vw));
      padding-bottom: max(5vw, env(safe-area-inset-bottom, 5vw));
      opacity: 0;
      pointer-events: none;
      -webkit-transition: opacity 0.55s ease 0.5s;
      transition: opacity 0.55s ease 0.5s;
    }
    .conf-overlay.enter {
      opacity: 1;
      pointer-events: auto;
    }

    .conf-wordmark-wrap {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: flex-end;
      align-items: flex-end;
      gap: 0;
      line-height: 1;
    }

    .conf-wordmark {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(5rem, 22vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #F5F0E8;
      text-transform: lowercase;
      white-space: nowrap;
      text-shadow: 0 2px 0 rgba(255,255,255,0.06), 0 8px 28px rgba(0,0,0,0.25);
    }

    .conf-dot {
      width: 0.55em;
      height: 0.55em;
      font-size: clamp(0.7rem, 3vw, 2rem);
      background: var(--terra);
      border-radius: 50%;
      margin-left: 0.12em;
      margin-bottom: 0.18em;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(196,96,58,0.5);
    }

    .conf-mid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    .conf-copy {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      line-height: 1.65;
      color: rgba(245,240,232,0.6);
      max-width: 28ch;
      text-transform: lowercase;
    }

    .conf-copy strong {
      color: #F5F0E8;
      font-weight: 500;
      text-transform: lowercase;
      display: block;
    }

    .conf-footer {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: flex-start;
      align-items: flex-start;
      gap: 7px;
    }

    .conf-rule {
      width: 22px;
      height: 1px;
      background: var(--terra);
      opacity: 0.45;
    }

    .conf-engine {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(16px, 4.5vw, 20px);
      letter-spacing: 0.01em;
      color: rgba(245,240,232,0.7);
      text-transform: lowercase;
    }

    @-webkit-keyframes fadeUp {
      from { opacity: 0; -webkit-transform: translateY(10px); transform: translateY(10px); }
      to   { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; -webkit-transform: translateY(10px); transform: translateY(10px); }
      to   { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
    }

    .page.exit {
      -webkit-transition: opacity 0.4s ease, -webkit-transform 0.4s ease;
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 0;
      -webkit-transform: translateY(-12px);
      transform: translateY(-12px);
      pointer-events: none;
    }

    @media (min-width: 768px) {
      .page { padding: 4rem 5rem; }
      .conf-overlay { padding: 4rem 5rem; }
    }
  </style>
</head>
<body>

  <svg class="arcs" id="arcs" viewBox="0 0 460 460" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="460" cy="0" r="90"  stroke="#1A1814" stroke-width="0.6" opacity="0.13"/>
    <circle cx="460" cy="0" r="155" stroke="#1A1814" stroke-width="0.6" opacity="0.11"/>
    <circle cx="460" cy="0" r="225" stroke="#1A1814" stroke-width="0.65" opacity="0.09"/>
    <circle cx="460" cy="0" r="300" stroke="#1A1814" stroke-width="0.55" opacity="0.08"/>
    <circle cx="460" cy="0" r="382" stroke="#1A1814" stroke-width="0.45" opacity="0.06"/>
    <circle cx="460" cy="0" r="470" stroke="#1A1814" stroke-width="0.35" opacity="0.04"/>
    <path d="M405 48 Q318 142 175 310" stroke="#1A1814" stroke-width="0.85" stroke-dasharray="3 9" fill="none" opacity="0.15"/>
    <path d="M388 22 Q295 112 145 285" stroke="#1A1814" stroke-width="0.45" stroke-dasharray="2 11" fill="none" opacity="0.08"/>
    <circle cx="405" cy="48" r="3.5" fill="#1A1814" opacity="0.18"/>
    <circle cx="405" cy="48" r="8" stroke="#1A1814" stroke-width="0.65" fill="none" opacity="0.11"/>
    <circle cx="175" cy="310" r="3" fill="#C4603A" opacity="0.28"/>
    <circle cx="175" cy="310" r="7" stroke="#C4603A" stroke-width="0.55" fill="none" opacity="0.16"/>
    <line x1="170" y1="310" x2="180" y2="310" stroke="#C4603A" stroke-width="0.55" opacity="0.2"/>
    <line x1="175" y1="305" x2="175" y2="315" stroke="#C4603A" stroke-width="0.55" opacity="0.2"/>
  </svg>

  <div class="ink-wash" id="inkWash"></div>

  <div class="page" id="mainPage">
    <div class="zone-top">
      <div class="wordmark-wrap">
        <span class="wordmark">wanda</span>
        <span class="terra-dot" aria-hidden="true"></span>
      </div>
    </div>

    <div class="zone-mid">
      <p class="eyebrow">start one step earlier</p>
      <div class="headline">
        <span class="hl-bold">inspiration before</span>
        <span class="hl-italic">destination.</span>
      </div>
      <div class="cta-wrap">
        <button class="flap-btn" id="flapBtn" type="button">
          <div class="flap-display" id="flapDisplay" aria-label="launches soon"></div>
        </button>
      </div>
    </div>

    <div class="zone-bot">
      <div class="footer-line">
        <div class="footer-rule" aria-hidden="true"></div>
        <span class="footer-text">the destination decision engine</span>
      </div>
    </div>
  </div>

  <div class="conf-overlay" id="confOverlay" aria-live="polite" aria-hidden="true">
    <div class="conf-wordmark-wrap">
      <span class="conf-wordmark">wanda</span>
      <span class="conf-dot" aria-hidden="true"></span>
    </div>
    <div class="conf-mid">
      <p class="conf-copy">
        the best trips take a little planning.
        <strong>wanda launches soon.</strong>
      </p>
    </div>
    <div class="conf-footer">
      <div class="conf-rule" aria-hidden="true"></div>
      <span class="conf-engine">the destination decision engine</span>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var TARGET   = 'LAUNCHES SOON';
    var ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var STAGGER  = 55;
    var FLIPS    = 9;
    var FLIP_MS  = 65;
    var REPLAY   = 13000;

    var cells       = [];
    var flipping    = false;
    var clicked     = false;
    var replayTimer = null;

    var display = document.getElementById('flapDisplay');
    var btn     = document.getElementById('flapBtn');

    function buildCells() {
      display.innerHTML = '';
      cells = [];
      var chars = TARGET.split('');
      var i, ch, sp, wrap, face;
      for (i = 0; i < chars.length; i++) {
        ch = chars[i];
        if (ch === ' ') {
          sp = document.createElement('div');
          sp.className = 'flap-char is-space';
          display.appendChild(sp);
          cells.push(null);
          continue;
        }
        wrap = document.createElement('div');
        wrap.className = 'flap-char';
        face = document.createElement('div');
        face.className = 'flap-face';
        face.textContent = ch;
        wrap.appendChild(face);
        display.appendChild(wrap);
        cells.push({ face: face, target: ch });
      }
    }

    function flipTo(face, newChar, duration, cb) {
      var half = Math.floor(duration / 2);
      face.style.webkitTransition = 'transform ' + half + 'ms ease-in';
      face.style.transition = 'transform ' + half + 'ms ease-in';
      face.style.webkitTransform = 'rotateX(-90deg)';
      face.style.transform = 'rotateX(-90deg)';
      setTimeout(function () {
        face.textContent = newChar;
        face.style.webkitTransition = 'none';
        face.style.transition = 'none';
        face.style.webkitTransform = 'rotateX(90deg)';
        face.style.transform = 'rotateX(90deg)';
        void face.offsetHeight;
        face.style.webkitTransition = 'transform ' + half + 'ms ease-out';
        face.style.transition = 'transform ' + half + 'ms ease-out';
        face.style.webkitTransform = 'rotateX(0deg)';
        face.style.transform = 'rotateX(0deg)';
        setTimeout(function () { if (cb) cb(); }, half + 10);
      }, half + 5);
    }

    function animateCell(cellObj, delay, onDone) {
      if (!cellObj) {
        setTimeout(function () { if (onDone) onDone(); }, delay);
        return;
      }
      var face  = cellObj.face;
      var count = 0;

      function step() {
        var r;
        if (count < FLIPS) {
          r = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
          flipTo(face, r, FLIP_MS, function () { count++; step(); });
        } else {
          flipTo(face, cellObj.target, FLIP_MS, onDone);
        }
      }
      setTimeout(step, delay);
    }

    function runBoard(onComplete) {
      if (flipping) return;
      flipping = true;
      var total = cells.filter(function (c) { return c !== null; }).length;
      var done  = 0;
      var i;

      function onCellDone() {
        done++;
        if (done >= total) {
          flipping = false;
          if (onComplete) onComplete();
        }
      }

      for (i = 0; i < cells.length; i++) {
        animateCell(cells[i], i * STAGGER, onCellDone);
      }
    }

    function makeScrambler(c, nonNull, getDone, setDone, onComplete) {
      return function () {
        var face  = c.face;
        var count = 0;
        var total = 7 + Math.floor(Math.random() * 7);

        function step() {
          var r;
          if (count < total) {
            r = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
            flipTo(face, r, FLIP_MS, function () { count++; step(); });
          } else {
            flipTo(face, c.target, FLIP_MS, function () {
              setDone(getDone() + 1);
              if (getDone() >= nonNull.length) {
                flipping = false;
                if (onComplete) onComplete();
              }
            });
          }
        }
        step();
      };
    }

    function scrambleAll(onComplete) {
      flipping = true;
      var nonNull = cells.filter(function (c) { return c !== null; });
      var done    = 0;
      var i;

      function getDone() { return done; }
      function setDone(v) { done = v; }

      for (i = 0; i < nonNull.length; i++) {
        makeScrambler(nonNull[i], nonNull, getDone, setDone, onComplete)();
      }
    }

    function scheduleReplay() {
      replayTimer = setTimeout(function () {
        if (!clicked) runBoard(scheduleReplay);
      }, REPLAY);
    }

    btn.addEventListener('click', function () {
      if (clicked) return;
      clicked = true;
      clearTimeout(replayTimer);
      btn.style.pointerEvents = 'none';
      btn.style.cursor = 'default';

      scrambleAll(function () {
        setTimeout(function () {
          var wash = document.getElementById('inkWash');
          var arcs = document.getElementById('arcs');
          wash.classList.add('expand');
          arcs.classList.add('shifted');

          setTimeout(function () {
            var overlay = document.getElementById('confOverlay');
            overlay.classList.add('enter');
            overlay.setAttribute('aria-hidden', 'false');
          }, 700);
        }, 240);
      });
    });

    btn.addEventListener('mouseenter', function () {
      if (!clicked && !flipping) {
        clearTimeout(replayTimer);
        runBoard(scheduleReplay);
      }
    });

    buildCells();

    setTimeout(function () {
      runBoard(scheduleReplay);
    }, 950);

  }());
  </script>

</body>
</html>
