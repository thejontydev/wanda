:root {
  --ink:       #1A1814;
  --ink-soft:  #3D3A35;
  --ink-muted: #7A756C;
  --paper:     #FAF8F5;
  --paper-mid: #E8E1D8;
  --terra:     #C4603A;
  --cream:     #F5F0E8;
}

html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100dvh;
  width: 100%;
  overflow: hidden;
  background: #FAF8F5;
  background: radial-gradient(ellipse 140% 110% at 30% 35%, #FAF8F5 0%, #F3EBE0 52%, #E8DDD0 100%);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* Prevent text size adjust on orientation change */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 500;
}

/* Arc illustration */
.arcs {
  position: fixed;
  top: -60px;
  right: -60px;
  width: 55vw;
  max-width: 460px;
  height: 55vw;
  max-height: 460px;
  pointer-events: none;
  z-index: 0;
  opacity: 1;
  transition: transform 1.8s cubic-bezier(0.16,1,0.3,1), opacity 1.4s ease;
}
.arcs.shifted {
  transform: translate(60px, -60px) scale(1.15) rotate(10deg);
  opacity: 0.3;
}

/* ── Full viewport layout ── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 6vw 6vw 5vw;
  /* iOS safe areas */
  padding-top: max(6vw, env(safe-area-inset-top, 6vw));
  padding-bottom: max(5vw, env(safe-area-inset-bottom, 5vw));
}

/* ── Top zone: wordmark ── */
.zone-top { flex-shrink: 0; }

.wordmark-wrap {
  display: flex;
  align-items: flex-end;
  gap: 0;
  line-height: 1;
  opacity: 0;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.15s;
}

.wordmark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  /* Much bigger — tested at 390px viewport */
  font-size: clamp(5rem, 22vw, 12rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--ink);
  text-transform: lowercase;
  white-space: nowrap;
  text-shadow: 0 2px 0 rgba(255,255,255,0.5), 0 8px 28px rgba(26,24,20,0.08);
}

.terra-dot {
  width: 0.55em;
  height: 0.55em;
  /* Size relative to font — never mismatched */
  font-size: clamp(0.7rem, 3vw, 2rem);
  background: var(--terra);
  border-radius: 50%;
  margin-left: 0.12em;
  margin-bottom: 0.18em;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(196,96,58,0.4);
}

/* ── Mid zone: content ── */
.zone-mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: clamp(0.8rem, 2.5vw, 1.8rem);
}

.eyebrow {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
  font-size: clamp(10px, 2.8vw, 13px);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.38s;
}

.headline {
  opacity: 0;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
}

.hl-bold {
  display: block;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(1.7rem, 6.5vw, 5rem);
  letter-spacing: -0.025em;
  line-height: 1.02;
  color: var(--ink);
}

.hl-italic {
  display: block;
  font-family: 'Lora', Georgia, 'Times New Roman', serif;
  font-weight: 500;
  font-style: italic;
  font-size: clamp(1.7rem, 6.5vw, 5rem);
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: var(--terra);
}

/* ── CTA ── */
.cta-wrap {
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.65s;
}

/* ════════════════════════════
   SPLIT-FLAP BUTTON
════════════════════════════ */
.flap-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  /* Responsive padding */
  padding: clamp(0.75rem, 2.5vw, 1.1rem) clamp(1.6rem, 5vw, 2.8rem);
  border-radius: 999px;
  background-color: var(--ink);
  border: none;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  position: relative;
  overflow: hidden;
  /* No min-width — let content size it */
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.05) inset,
    0 6px 24px rgba(26,24,20,0.22),
    0 2px 6px rgba(26,24,20,0.16);
  transition: transform 0.18s ease, box-shadow 0.22s ease;
}

.flap-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.07) inset,
    0 10px 32px rgba(26,24,20,0.26),
    0 4px 10px rgba(26,24,20,0.18);
}

.flap-btn:active {
  transform: scale(0.97);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.05) inset,
    0 3px 12px rgba(26,24,20,0.2);
}

/* Sheen animation on pill */
.flap-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,0.055) 50%,
    transparent 80%
  );
  background-size: 250% 100%;
  background-position: 200% 0;
  animation: sheen 5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes sheen {
  0%, 30% { background-position: 200% 0; }
  60%      { background-position: -100% 0; }
  100%     { background-position: 200% 0; }
}

/* ── Flap display ── */
.flap-display {
  display: flex;
  align-items: center;
  /* Gap between characters */
  gap: clamp(1px, 0.5vw, 4px);
  position: relative;
  z-index: 2;
}

.flap-char {
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: clamp(10px, 3vw, 20px);
  height: clamp(20px, 6vw, 40px);
  perspective: 200px;
  -webkit-perspective: 200px;
}

.flap-char.is-space {
  width: clamp(4px, 1.2vw, 9px);
}

/* Prevent FOUT flash during font load */
.flap-face {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  font-weight: 600;
  font-size: clamp(0.75rem, 2.8vw, 1.4rem);
  letter-spacing: 0.05em;
  color: var(--cream);
  text-shadow: 0 1px 3px rgba(0,0,0,0.35);
  will-change: transform;
  transform-origin: center;
  -webkit-transform-origin: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  /* Defensive — no wrap */
  white-space: nowrap;
}

/* The mechanical mid-line */
.flap-char:not(.is-space)::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: rgba(0,0,0,0.3);
  z-index: 5;
  pointer-events: none;
}

/* ── Bottom zone: footer ── */
.zone-bot { flex-shrink: 0; }

.footer-line {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 7px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.85s;
}

.footer-rule {
  width: 22px;
  height: 1px;
  background: var(--terra);
  opacity: 0.55;
}

.footer-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  font-size: clamp(16px, 4.5vw, 20px);
  letter-spacing: 0.01em;
  color: var(--ink-soft);
  text-transform: lowercase;
}

/* ══════════════════════
   INK WASH TRANSITION
══════════════════════ */
.ink-wash {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--ink);
  /* Start as a point */
  -webkit-clip-path: circle(0% at 50% 70%);
  clip-path: circle(0% at 50% 70%);
  transition:
    -webkit-clip-path 0.8s cubic-bezier(0.7,0,0.3,1),
    clip-path 0.8s cubic-bezier(0.7,0,0.3,1);
  pointer-events: none;
}
.ink-wash.expand {
  -webkit-clip-path: circle(160% at 50% 70%);
  clip-path: circle(160% at 50% 70%);
  pointer-events: auto;
}

/* ══════════════════════
   CONFIRMED OVERLAY
══════════════════════ */
.conf-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 6vw 6vw 5vw;
  padding-top: max(6vw, env(safe-area-inset-top, 6vw));
  padding-bottom: max(5vw, env(safe-area-inset-bottom, 5vw));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.55s ease 0.5s;
}
.conf-overlay.enter {
  opacity: 1;
  pointer-events: auto;
}

.conf-wordmark-wrap {
  display: flex;
  align-items: flex-end;
  gap: 0;
  line-height: 1;
}

.conf-wordmark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(5rem, 22vw, 12rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--cream);
  text-transform: lowercase;
  white-space: nowrap;
  text-shadow: 0 2px 0 rgba(255,255,255,0.06), 0 8px 28px rgba(0,0,0,0.25);
}

.conf-dot {
  width: 0.55em;
  height: 0.55em;
  font-size: clamp(0.7rem, 3vw, 2rem);
  background: var(--terra);
  border-radius: 50%;
  margin-left: 0.12em;
  margin-bottom: 0.18em;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(196,96,58,0.5);
}

.conf-mid {
  display: flex;
  flex-direction: column;
}

.conf-copy {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 300;
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  line-height: 1.65;
  /* Explicit lowercase in source — no CSS dependency */
  color: rgba(245,240,232,0.6);
  max-width: 28ch;
  text-transform: lowercase;
}

.conf-copy strong {
  color: var(--cream);
  font-weight: 500;
  text-transform: lowercase;
  display: block;
}

.conf-footer {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 7px;
}

.conf-rule {
  width: 22px;
  height: 1px;
  background: var(--terra);
  opacity: 0.45;
}

.conf-engine {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  font-size: clamp(16px, 4.5vw, 20px);
  letter-spacing: 0.01em;
  color: rgba(245,240,232,0.7);
  text-transform: lowercase;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.page.exit {
  transition: opacity 0.4s ease, transform 0.4s ease;
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
}

/* Desktop adjustments */
@media (min-width: 768px) {
  .page { padding: 4rem 5rem; }
  .conf-overlay { padding: 4rem 5rem; }
}

  <script>
  (function () {
    'use strict';

    // ── Config ──
    var TARGET   = 'launches soon';
    var ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ·—';
    var STAGGER  = 55;   // ms between chars starting
    var FLIPS    = 9;    // random flips before landing
    var FLIP_MS  = 65;   // ms per flip
    var REPLAY   = 13000; // auto-replay ms

    // ── State ──
    var cells       = [];
    var flipping    = false;
    var clicked     = false;
    var replayTimer = null;

    var display = document.getElementById('flapDisplay');
    var btn     = document.getElementById('flapBtn');

    // ── Build character cells ──
    function buildCells() {
      display.innerHTML = '';
      cells = [];
      var chars = TARGET.split('');
      for (var i = 0; i < chars.length; i++) {
        var ch = chars[i];
        if (ch === ' ') {
          var sp = document.createElement('div');
          sp.className = 'flap-char is-space';
          display.appendChild(sp);
          cells.push(null);
          continue;
        }
        var wrap = document.createElement('div');
        wrap.className = 'flap-char';
        var face = document.createElement('div');
        face.className = 'flap-face';
        face.textContent = ch.toUpperCase();
        wrap.appendChild(face);
        display.appendChild(wrap);
        cells.push({ face: face, target: ch.toUpperCase() });
      }
    }

    // ── Flip one face to a new char (CSS 3D) ──
    function flipTo(face, newChar, duration, cb) {
      var half = Math.floor(duration / 2);
      // First half: fold down
      face.style.transition = 'transform ' + half + 'ms ease-in';
      face.style.transform  = 'rotateX(-90deg)';
      setTimeout(function () {
        face.textContent = newChar;
        face.style.transition = 'none';
        face.style.transform  = 'rotateX(90deg)';
        // Trigger reflow
        void face.offsetHeight;
        // Second half: unfold up
        face.style.transition = 'transform ' + half + 'ms ease-out';
        face.style.transform  = 'rotateX(0deg)';
        setTimeout(function () { if (cb) cb(); }, half + 10);
      }, half + 5);
    }

    // ── Animate one cell: N random flips then land ──
    function animateCell(cellObj, delay, onDone) {
      if (!cellObj) { setTimeout(function () { if (onDone) onDone(); }, delay); return; }
      var face  = cellObj.face;
      var count = 0;

      function step() {
        if (count < FLIPS) {
          var r = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
          flipTo(face, r, FLIP_MS, function () { count++; step(); });
        } else {
          flipTo(face, cellObj.target, FLIP_MS, onDone);
        }
      }
      setTimeout(step, delay);
    }

    // ── Run entire board left→right ──
    function runBoard(onComplete) {
      if (flipping) return;
      flipping = true;
      var total = cells.filter(function (c) { return c !== null; }).length;
      var done  = 0;

      function onCellDone() {
        done++;
        if (done >= total) {
          flipping = false;
          if (onComplete) onComplete();
        }
      }

      for (var i = 0; i < cells.length; i++) {
        animateCell(cells[i], i * STAGGER, onCellDone);
      }
    }

    // ── Scramble all simultaneously then land ──
    function scrambleAll(onComplete) {
      flipping = true;
      var nonNull = cells.filter(function (c) { return c !== null; });
      var done    = 0;

      nonNull.forEach(function (c) {
        var face  = c.face;
        var count = 0;
        var total = 7 + Math.floor(Math.random() * 7);

        function step() {
          if (count < total) {
            var r = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
            flipTo(face, r, FLIP_MS, function () { count++; step(); });
          } else {
            flipTo(face, c.target, FLIP_MS, function () {
              done++;
              if (done >= nonNull.length) {
                flipping = false;
                if (onComplete) onComplete();
              }
            });
          }
        }
        step();
      });
    }

    // ── Schedule auto-replay ──
    function scheduleReplay() {
      replayTimer = setTimeout(function () {
        if (!clicked) runBoard(scheduleReplay);
      }, REPLAY);
    }

    // ── Click ──
    btn.addEventListener('click', function () {
      if (clicked) return;
      clicked = true;
      clearTimeout(replayTimer);
      btn.style.pointerEvents = 'none';
      btn.style.cursor = 'default';

      scrambleAll(function () {
        setTimeout(function () {
          // Ink wash expands
          var wash = document.getElementById('inkWash');
          var arcs = document.getElementById('arcs');
          wash.classList.add('expand');
          arcs.classList.add('shifted');

          // Confirmed overlay
          setTimeout(function () {
            var overlay = document.getElementById('confOverlay');
            overlay.classList.add('enter');
            overlay.setAttribute('aria-hidden', 'false');
          }, 700);
        }, 240);
      });
    });

    // ── Hover replay ──
    btn.addEventListener('mouseenter', function () {
      if (!clicked && !flipping) {
        clearTimeout(replayTimer);
        runBoard(scheduleReplay);
      }
    });

    // ── Init ──
    buildCells();

    // Boot sequence — board powers on
    setTimeout(function () {
      runBoard(scheduleReplay);
    }, 950);

  }());
  </script>
